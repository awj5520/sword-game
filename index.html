<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>검 강화 RPG</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/enhance.css">
    <link rel="stylesheet" href="css/effects.css">
</head>
<body>

<div class="game-wrapper">

    <div class="top-bar">
        <div class="title">검 강화 RPG</div>
        <div id="gold-text" class="gold">💰 0</div>
    </div>

    <div class="main-card">

        <div id="enhance-circle">
            <div id="enhance-level">+0</div>
        </div>

        <div class="stats">
            <div class="damage-wrapper">
                <div id="damage-text" class="stat clickable" onclick="toggleDamageBreakdown()">
                    ⚔️ 공격력 <span id="damage-value">0</span> <span class="stat-arrow">▼</span>
                </div>
                <div id="damage-breakdown" class="damage-breakdown" style="display:none"></div>
            </div>

            <div id="hp-text" class="stat"></div>

            <div id="success-rate" class="stat rate">
                강화 성공 확률 <span>100%</span>
            </div>
        </div>

        <div class="menu-shortcuts">
            <button class="menu-btn" onclick="location.href='achievement.html'">
                🏆 업적
            </button>
            <button class="menu-btn" onclick="location.href='stats.html'">
                📊 통계
            </button>
            <button class="menu-btn" onclick="location.href='monster-codex.html'">
                📘 몬스터 도감
            </button>
        </div>

        <div id="message" class="message"></div>

        <div class="button-group">
            <button id="btn-upgrade" class="btn upgrade">⚒ 강화하기</button>

            <button class="btn hunt" onclick="goWorld(1)">
                🌍 1세계 사냥터
            </button>

            <button class="btn hunt" onclick="goWorld(2)">
                🌌 2세계 사냥터
            </button>

            <button class="btn hunt" onclick="goWorld(3)">
                🌠 3세계 사냥터
            </button>

            <button class="btn quest" onclick="location.href='quest.html'">📋 일일 퀘스트</button>
            <button class="btn dungeon" onclick="location.href='dungeon.html'">⚔️ 웨이브 던전</button>
            <button class="btn shop" onclick="location.href='shop.html'">🛒 상점</button>
            <button class="btn bag" onclick="location.href='inventory.html'">🎒 배낭</button>
        </div>

    </div>
</div>

<script src="js/gamedata.js"></script>
<script src="js/item-defs.js"></script>
<script src="js/effects.js"></script>
<script src="js/enhance.js"></script>

<script>
function goWorld(world) {
    if (world === 2 && GameData.level < 300) {
        alert('2세계는 강화 +300 이상 필요합니다!');
        return;
    }

    if (world === 3 && GameData.level < 700) {
        alert('3세계는 강화 +700 이상 필요합니다!');
        return;
    }

    location.href = `hunt.html?world=${world}`;
}
</script>

</body>
</html>
