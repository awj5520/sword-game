<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사냥터</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/hunt.css">
</head>
<body>

<div class="hunt-wrapper">

    <h2 id="world-title" class="world-title"></h2>

    <div id="region-grid"></div>

    <button class="back-btn" onclick="location.href='index.html'">
        🔙 돌아가기
    </button>

</div>

<script src="js/gamedata.js"></script>
<script>
const params = new URLSearchParams(location.search);
const world = Number(params.get('world') || 1);

/* 🔒 2세계 제한 */
if (world === 2 && GameData.level < 100) {
    alert('2세계는 강화 +100 이상 필요합니다!');
    location.href = 'index.html';
}

document.getElementById('world-title').innerText =
    world === 1 ? '🌍 1세계 사냥터' : '🌌 2세계 사냥터';

const DATA = {
    1: [
        { title:'🌱 초원', area:'grass', monsters:[
            ['슬라임',1],
            ['투구 슬라임',2],
            ['전사 슬라임',3],
            ['광폭화 슬라임',4],
            ['👑 슬라임 왕',5]
        ]},
        { title:'🪓 오크 부락', area:'orc', monsters:[
            ['풋내기 오크',1],
            ['전사 오크',2],
            ['광전사 오크',3],
            ['주술사 오크',4],
            ['👑 오크 족장',5]
        ]},
        { title:'🐉 드래곤 협곡', area:'dragon', monsters:[
            ['새끼 드레이크',1],
            ['불꽃 드레이크',2],
            ['비늘 와이번',3],
            ['다크 드래곤',4],
            ['👑 골드 드래곤',5]
        ]},
        { title:'🌌 우주', area:'space', monsters:[
            ['갤럭시 슬라임',1],
            ['갤럭시 오크',2],
            ['👑 갤럭시 드래곤',3]
        ]}
    ],
    2: [
        { title:'🕳️ 동굴', area:'cave', monsters:[
            ['동굴 박쥐',1],
            ['어둠 박쥐',2],
            ['흡혈 박쥐',3],
            ['광폭 박쥐',4],
            ['👑 박쥐 군주',5]
        ]},
        { title:'⚰️ 무덤', area:'grave', monsters:[
            ['해골 병사',1],
            ['해골 궁수',2],
            ['해골 기사',3],
            ['저주받은 해골',4],
            ['👑 해골 군주',5]
        ]},
        { title:'🏰 악마성', area:'demon', monsters:[
            ['악마 하수인',1],
            ['악마 기사',2],
            ['지옥 마법사',3],
            ['타락한 군주',4],
            ['👑 마왕',5]
        ]},
        { title:'🔥 마계', area:'hell', monsters:[
            ['탐욕의 망령',1],
            ['질투의 망령',2],
            ['👑 분노의 신',3]
        ]}
    ]
};

const grid = document.getElementById('region-grid');

/* 렌더링 */
DATA[world].forEach(region => {
    const box = document.createElement('div');
    box.className = 'region-box';

    const title = document.createElement('div');
    title.className = 'region-title';
    title.innerText = region.title;
    box.appendChild(title);

    region.monsters.forEach(([name, stage]) => {
        const btn = document.createElement('button');
        btn.className = 'monster-text';
        btn.innerText = name;
        btn.onclick = (e) => {
            e.stopPropagation(); // 🔥 상위 클릭 방지
            location.href =
                `stage.html?world=${world}&area=${region.area}&stage=${stage}`;
        };
        box.appendChild(btn);
    });

    grid.appendChild(box);
});
</script>

</body>
</html>
