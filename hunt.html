<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사냥터</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/hunt.css">

    <style>
        /* ── 잠긴 스테이지 버튼 ── */
        .monster-text.locked {
            cursor: not-allowed;
            opacity: 0.55;
            filter: grayscale(0.6) brightness(0.8);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .monster-text.locked:hover {
            filter: grayscale(0.6) brightness(0.8);
            transform: none;
            box-shadow:
                0 3px 0 0 rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.05);
            border-color: var(--px-border);
            color: var(--px-text);
        }
        .monster-text.locked:active {
            transform: none;
            box-shadow:
                0 3px 0 0 rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .monster-text .lock-icon {
            flex-shrink: 0;
        }
        .monster-text .lock-req {
            margin-left: auto;
            font-size: 10px;
            font-weight: 700;
            color: var(--px-red);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="hunt-wrapper">

    <h2 id="world-title" class="world-title"></h2>

    <div id="region-grid"></div>

    <button class="back-btn" onclick="location.href='index.html'">
        🔙 돌아가기
    </button>

</div>

<script src="js/gamedata.js"></script>
<script src="js/item-defs.js"></script>
<script>
const params = new URLSearchParams(location.search);
const world = Number(params.get('world') || 1);

/* ──────────────────────────────────────────────
   스테이지별 필요 강화 레벨 규칙
   - 세계마다 시작 레벨과 스테이지 간 간격이 다름
   - 1세계: 0부터 +5씩
   - 2세계: 300부터 +10씩
   - 3세계: 700부터 +20씩
   필요 레벨은 세계 안에서 스테이지 순서(지역 순서 × 단계)대로 누적
────────────────────────────────────────────── */
const WORLD_REQ_BASE = { 1: 0,  2: 300, 3: 700 };
const WORLD_REQ_STEP = { 1: 5,  2: 10,  3: 20  };

/* 세계 진입 시 튕겨내지 않음.
   레벨이 미달이면 해당 세계 화면은 그대로 보여주되,
   각 스테이지는 아래 렌더링에서 자물쇠로 잠긴 상태로 표시됨. */

document.getElementById('world-title').innerText =
    world === 1 ? '🌍 1세계 사냥터'
  : world === 2 ? '🌌 2세계 사냥터'
  : '🌠 3세계 사냥터';

const DATA = {
    1: [
        { title:'🌱 초원', area:'grass', monsters:[
            ['슬라임',1],
            ['투구 슬라임',2],
            ['전사 슬라임',3],
            ['광폭화 슬라임',4],
            ['👑 슬라임 왕',5]
        ]},
        { title:'🪓 오크 부락', area:'orc', monsters:[
            ['풋내기 오크',1],
            ['전사 오크',2],
            ['광전사 오크',3],
            ['주술사 오크',4],
            ['👑 오크 족장',5]
        ]},
        { title:'🐉 드래곤 협곡', area:'dragon', monsters:[
            ['새끼 드레이크',1],
            ['불꽃 드레이크',2],
            ['비늘 와이번',3],
            ['다크 드래곤',4],
            ['👑 골드 드래곤',5]
        ]},
        { title:'🌌 우주', area:'space', monsters:[
            ['갤럭시 슬라임',1],
            ['갤럭시 오크',2],
            ['👑 갤럭시 드래곤',3]
        ]}
    ],
    2: [
        { title:'🕳️ 동굴', area:'cave', monsters:[
            ['동굴 박쥐',1],
            ['어둠 박쥐',2],
            ['흡혈 박쥐',3],
            ['광폭 박쥐',4],
            ['👑 박쥐 군주',5]
        ]},
        { title:'⚰️ 무덤', area:'grave', monsters:[
            ['해골 병사',1],
            ['해골 궁수',2],
            ['해골 기사',3],
            ['저주받은 해골',4],
            ['👑 해골 군주',5]
        ]},
        { title:'🏰 악마성', area:'demon', monsters:[
            ['악마 하수인',1],
            ['악마 기사',2],
            ['지옥 마법사',3],
            ['타락한 군주',4],
            ['👑 마왕',5]
        ]},
        { title:'🔥 마계', area:'hell', monsters:[
            ['탐욕의 망령',1],
            ['질투의 망령',2],
            ['👑 분노의 신',3]
        ]}
    ],

    /* ✅ 3세계 추가 */
    3: [
        { title:'🌊 아틀란티스', area:'atlantis', monsters:[
            ['산호 슬라임',1],
            ['심해 해마 기사',2],
            ['잠수꾼 망령',3],
            ['크라켄',4],
            ['👑 포세이돈',5]
        ]},
        { title:'💀 저승', area:'underworld', monsters:[
            ['길잃은 영혼',1],
            ['지옥 사냥개',2],
            ['사신의 그림자',3],
            ['스틱스 망령',4],
            ['👑 하데스',5]
        ]},
        { title:'⚡ 천둥의 성', area:'thunder', monsters:[
            ['구름 정령',1],
            ['번개 박쥐',2],
            ['스톰 나이트',3],
            ['천둥 골렘',4],
            ['👑 제우스',5]
        ]},
        { title:'✨ 신계', area:'divine', monsters:[
            ['크로노스',1],
            ['가이아',2],
            ['카오스',3]
        ]},

        /* ✅ ✅ ✅ 여기만 추가됨: 🎲 운명의 균열 */
        { title:'🎲 운명의 균열', area:'rift', monsters:[
            ['🎲 주사위의 제단',1],
            ['🌓 양면의 문',2],
            ['⚖️ 균형의 심판대',3],
            ['🌀 카오스의 심연',4]
        ]}
    ]
};

const grid = document.getElementById('region-grid');

/* 현재 세계의 시작 레벨/간격 */
const reqBase = WORLD_REQ_BASE[world] || 0;
const reqStep = WORLD_REQ_STEP[world] || 5;

/* 렌더링 */
let stageIndex = 0; /* 세계 안에서 스테이지 순서 (0부터) */

(DATA[world] || []).forEach(region => {
    const box = document.createElement('div');
    box.className = 'region-box';

    const title = document.createElement('div');
    title.className = 'region-title';
    title.innerText = region.title;
    box.appendChild(title);

    region.monsters.forEach(([name, stage]) => {
        /* 이 스테이지의 필요 강화 레벨 */
        const reqLevel = reqBase + stageIndex * reqStep;
        stageIndex++;

        /* 현재 레벨로 매번 판정 → 레벨이 내려가면 자동으로 다시 잠김 */
        const locked = GameData.level < reqLevel;

        const btn = document.createElement('button');
        btn.className = 'monster-text' + (locked ? ' locked' : '');

        if (locked) {
            /* 잠긴 경우: 자물쇠 + 필요 레벨 표시, 클릭 차단 */
            btn.innerHTML =
                `<span class="lock-icon">🔒</span> ${name}` +
                `<span class="lock-req">+${reqLevel} 필요</span>`;
            btn.disabled = true;
            btn.title = `강화 +${reqLevel} 이상 필요`;
        } else {
            /* 해제된 경우: 평소대로 입장 가능 */
            btn.innerText = name;
            btn.onclick = (e) => {
                e.stopPropagation();
                location.href =
                    `stage.html?world=${world}&area=${region.area}&stage=${stage}`;
            };
        }

        box.appendChild(btn);
    });

    grid.appendChild(box);
});
</script>

</body>
</html>
