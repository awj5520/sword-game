<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스테이지</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/effects.css">
</head>
<body>

<div id="stage" class="stage-wrapper">

    <div class="top-ui">
        <div class="status-box player-status">
            <div id="player-hp-text" class="status-label">유저 HP 0 / 0</div>
            <div class="hp-bar">
                <div id="player-hp-fill" class="hp-fill"></div>
            </div>
        </div>
    </div>

    <div class="battle-field">
        <div id="monster-wrapper">
            <img id="monster" src="" alt="monster">
        </div>
    </div>

    <img id="monster-img" alt="">
    <div id="stage-bg"></div>

    <div class="bottom-ui">
        <div class="status-box monster-status">
            <div id="monster-hp-text" class="status-label">몬스터 HP 0 / 0</div>
            <div class="hp-bar">
                <div id="monster-hp-fill" class="hp-fill"></div>
            </div>
        </div>

        <div id="log">전투 시작!</div>

        <div class="info">
            <div id="gold-text">💰 0</div>
            <div id="damage-text">공격력 0</div>
        </div>

        <div class="battle-potions">
            <button id="btn-potion-small" class="potion-btn" onclick="useHpPotion('small')">
                HP 소 <span id="potion-count-small" class="potion-count">x0</span>
            </button>
            <button id="btn-potion-medium" class="potion-btn" onclick="useHpPotion('medium')">
                HP 중 <span id="potion-count-medium" class="potion-count">x0</span>
            </button>
            <button id="btn-potion-large" class="potion-btn" onclick="useHpPotion('large')">
                HP 대 <span id="potion-count-large" class="potion-count">x0</span>
            </button>
        </div>

        <button id="back-btn">사냥터로 돌아가기</button>
    </div>

</div>

<script src="js/gamedata.js"></script>
<script src="js/effects.js"></script>
<script src="js/item-defs.js"></script>
<script src="js/drop-tables.js"></script>
<script src="js/player-skills.js"></script>
<script src="js/stage.js"></script>

<script>
document.getElementById('back-btn').onclick = () => {
    const params = new URLSearchParams(location.search);
    const world = params.get('world') || 1;
    location.href = `hunt.html?world=${world}`;
};
</script>

</body>
</html>
